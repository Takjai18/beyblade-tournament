services:
  db:
    image: postgres:16-alpine
    container_name: beyblade-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beyblade_tournament
    ports:
      - "5432:5432"
    volumes:
      - beyblade_pg_data:/var/lib/postgresql/data

volumes:
  beyblade_pg_data:
